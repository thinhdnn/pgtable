name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub release from this build'
        type: boolean
        default: true
      tag:
        description: 'Tag name (blank = v<version> from package.json)'
        type: string
        required: false
      draft:
        description: 'Publish as draft'
        type: boolean
        default: true
      scan:
        description: 'Submit artifacts to VirusTotal (uploads are PUBLIC)'
        type: boolean
        default: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            build: npm run build && npx electron-builder --win --x64 --publish never
          # Apple Silicon only. If an Intel (x64) build is ever added back it must
          # run on its own x64 runner: @duckdb/node-api ships per-arch prebuilds
          # and electron-builder.yml sets npmRebuild: false, so a cross-arch build
          # would pack the host's .node into the wrong artifact.
          - name: macos-arm64
            os: macos-14
            build: npm run build && npx electron-builder --mac --arm64 --publish never

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build and package
        run: ${{ matrix.build }}
        env:
          # Unsigned builds. electron-builder skips codesign/notarization when no
          # identity is present; set CSC_LINK/CSC_KEY_PASSWORD to sign.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: pgtable-${{ matrix.name }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 14

  virustotal:
    name: VirusTotal scan
    needs: build
    # Never on PRs: uploads via the free public API are PUBLIC and rate-limited,
    # so we do not submit every PR build. Manual runs opt in via the `scan` input.
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.scan)
    runs-on: ubuntu-latest
    outputs:
      max_malicious: ${{ steps.scan.outputs.max_malicious }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Scan artifacts
        id: scan
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: .github/scripts/vt-scan.sh artifacts/pgtable-*.dmg artifacts/pgtable-*.exe

      - uses: actions/upload-artifact@v4
        with:
          name: virustotal-report
          path: vt-report.md

  release:
    name: Publish release
    needs: [build, virustotal]
    # `virustotal` is skipped when scanning is off, and a skipped `needs` would
    # normally skip this job too -- hence the explicit result checks. A VT
    # failure still blocks the release; a VT skip does not.
    if: >-
      !cancelled() &&
      needs.build.result == 'success' &&
      needs.virustotal.result != 'failure' &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' && inputs.release))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve tag and release body
        id: meta
        env:
          # Via env, never interpolated into the script body: `inputs.tag` is
          # attacker-controlled text and `${{ }}` would splice it into bash.
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ -n "${INPUT_TAG}" ]]; then
            tag="${INPUT_TAG}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="v$(node -p "require('./package.json').version")"
          fi
          echo "tag=${tag}" >>"$GITHUB_OUTPUT"
          # The VT job may have been skipped; body_path must still point at a file.
          [[ -f artifacts/vt-report.md ]] || echo "_VirusTotal scan skipped._" >artifacts/vt-report.md
          echo "Releasing as ${tag}"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: artifacts/pgtable-*
          body_path: artifacts/vt-report.md
          draft: ${{ github.event_name != 'workflow_dispatch' || inputs.draft }}
          generate_release_notes: true
